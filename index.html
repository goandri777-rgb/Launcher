<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALAS · Launcher Logístico</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B5F8D" />
    <script src="/ui-protection.js" defer></script>
    <link rel="stylesheet" href="/alas-motion.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* CSS crítico inline: evita flash blanco antes de que Vite inyecte el CSS bundle */
      html, body { margin: 0; height: 100%; }
      body {
        background:
          radial-gradient(ellipse 70% 55% at 50% 42%, rgba(11,95,141,0.04), transparent 65%),
          linear-gradient(145deg, #edf1f7 0%, #e6ecf5 55%, #edf2f8 100%);
      }
      #root { height: 100%; position: relative; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
